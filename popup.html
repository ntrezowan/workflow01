<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body {
      width: 300px; padding: 12px; margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: #ffffff; color: #333333;
    }
    h4 {
      margin: 0 0 6px 0; font-size: 11px; color: #666;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .section { margin-bottom: 12px; }

    /* ---- Current workspace banner ---- */
    .current-banner {
      background: #0060df; color: #fff;
      padding: 9px 13px; border-radius: 8px; margin-bottom: 12px;
    }
    .current-banner .label {
      opacity: 0.9; font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.6px;
    }
    .current-banner .name {
      font-weight: 800; font-size: 18px; margin-top: 2px;
      letter-spacing: -0.3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .current-banner.unassigned { background: #52525e; }

    /* ---- Workspace list: compact single-line rows ---- */
    #workspace-list {
      display: flex; flex-direction: column; gap: 3px;
      max-height: 320px; overflow-y: auto;
    }
    .workspace-item {
      display: flex; align-items: center; gap: 8px;
      background: #f0f4f8; padding: 5px 10px; border-radius: 5px;
      cursor: pointer; border: 1.5px solid transparent;
      transition: background 0.12s, border-color 0.12s;
      min-height: 32px;
    }
    .workspace-item:hover { background: #e2e8f0; border-color: #b0bec5; }
    .workspace-item.active { border-color: #0060df; background: #deeaff; }

    .workspace-name {
      flex-grow: 1; font-weight: 700; font-size: 13px;
      color: #111; letter-spacing: -0.1px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .workspace-item.active .workspace-name { color: #003eaa; }

    .workspace-tabs {
      font-size: 11px; color: #666; flex-shrink: 0; font-weight: 600;
      background: rgba(0,0,0,0.07); padding: 1px 7px; border-radius: 10px;
    }
    .workspace-item.active .workspace-tabs { color: #0060df; background: rgba(0,96,223,0.14); }

    .row-btn {
      flex-shrink: 0; border: none; background: none; cursor: pointer;
      color: #aaa; font-size: 14px; line-height: 1; padding: 2px 4px;
      border-radius: 4px; transition: all 0.12s; opacity: 0;
    }
    .workspace-item:hover .row-btn { opacity: 1; }
    .rename-btn:hover { color: #0060df; background: rgba(0,96,223,0.1); }
    .delete-btn:hover { color: #d73a49; background: rgba(215,58,73,0.1); }

    /* ---- Input ---- */
    input.ws-input {
      width: 100%; padding: 9px 10px; border: 1px solid #ccc;
      border-radius: 6px; font-size: 13px; background: #fff; color: #333;
      transition: border-color 0.15s;
    }
    input.ws-input:focus {
      outline: none; border-color: #0060df;
      box-shadow: 0 0 0 2px rgba(0,96,223,0.2);
    }
    .input-hint { font-size: 10px; color: #999; margin-top: 4px; }
    .input-error { color: #d73a49; }

    .empty-msg { font-size: 12px; color: #777; padding: 6px 2px; }

    /* ---- Confirm dialog ---- */
    .confirm-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); z-index: 100;
      align-items: center; justify-content: center;
    }
    .confirm-overlay.visible { display: flex; }
    .confirm-box {
      background: #fff; border-radius: 10px; padding: 18px; width: 240px;
      text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .confirm-box p { margin: 0 0 14px 0; font-size: 13px; color: #333; }
    .confirm-box .btn-row { display: flex; gap: 8px; }
    .confirm-box .btn-row button {
      flex: 1; padding: 8px; border-radius: 6px; font-size: 13px;
      cursor: pointer; border: 1px solid #ccc;
    }
    .confirm-box .btn-cancel { background: #f5f5f5; color: #333; }
    .confirm-box .btn-danger { background: #d73a49; color: #fff; border-color: #d73a49; }

    /* ---- Dark theme ---- */
    @media (prefers-color-scheme: dark) {
      body { background: #1c1b22; color: #fbfbfe; }
      h4 { color: #9b9ba6; }
      .current-banner { background: #0060df; }
      .current-banner.unassigned { background: #52525e; }
      /* Workspace rows: higher contrast text in dark mode */
      .workspace-item { background: #2b2a33; color: #fbfbfe; }
      .workspace-item:hover { background: #3a3944; border-color: #5c5b69; }
      .workspace-item.active { border-color: #00ddff; background: #1a2a3a; }
      .workspace-name { color: #f4f4ff; font-weight: 700; }
      .workspace-item.active .workspace-name { color: #7dd3fc; }
      .workspace-tabs { color: #b8b8c8; background: rgba(255,255,255,0.09); font-weight: 600; }
      .workspace-item.active .workspace-tabs { color: #00ddff; background: rgba(0,221,255,0.18); }
      .row-btn { color: #8f8f9d; }
      input.ws-input { background: #2b2a33; border-color: #42414d; color: #fbfbfe; }
      input.ws-input::placeholder { color: #8f8f9d; }
      input.ws-input:focus { border-color: #00ddff; box-shadow: 0 0 0 2px rgba(0,221,255,0.2); }
      .confirm-box { background: #2b2a33; }
      .confirm-box p { color: #fbfbfe; }
      .confirm-box .btn-cancel { background: #42414d; color: #fbfbfe; border-color: #52525e; }
    }
  </style>
</head>
<body>

  <div id="current-banner" class="current-banner unassigned">
    <div class="label">Current Workspace</div>
    <div class="name" id="current-name">None</div>
  </div>

  <div class="section">
    <h4>Workspaces</h4>
    <div id="workspace-list"></div>
  </div>

  <div class="section">
    <h4>Create or Switch</h4>
    <input type="text" id="workspace-name" class="ws-input" placeholder="Workspace name..." autofocus>
    <div class="input-hint" id="input-hint">Enter to create new or switch to existing</div>
  </div>

  <div style="text-align:center;margin-top:4px;">
    <a href="#" id="reset-link" style="font-size:10px;color:#999;text-decoration:none;">Reset all workspaces</a>
  </div>

  <div class="confirm-overlay" id="confirm-overlay">
    <div class="confirm-box">
      <p id="confirm-message">Are you sure?</p>
      <div class="btn-row">
        <button class="btn-cancel" id="confirm-cancel">Cancel</button>
        <button class="btn-danger" id="confirm-ok">Delete</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
