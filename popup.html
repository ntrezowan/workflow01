<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    html { color-scheme: light dark; }
    :root {
      --panel-bg: Canvas;
      --text: CanvasText;
      --muted: GrayText;
      --border: color-mix(in srgb, CanvasText 18%, transparent);
      --button-bg: color-mix(in srgb, CanvasText 7%, Canvas);
      --button-hover: color-mix(in srgb, CanvasText 12%, Canvas);
      --button-active: color-mix(in srgb, AccentColor 16%, Canvas);
      --shadow: 0 8px 22px rgba(0, 0, 0, .28);
      --radius: 8px;
    }
    body {
      width: 328px;
      margin: 0;
      padding: 0;
      color: var(--text);
      background: transparent;
      font: menu;
    }
    .panel {
      margin: 0;
      padding: 10px;
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: var(--shadow);
    }
    .current-box {
      padding: 6px 8px 8px;
      margin-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .current-label {
      margin: 0 0 2px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
    }
    .current-name {
      margin: 0;
      color: var(--text);
      font-size: 15px;
      font-weight: 700;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .toolbar-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin: 0 0 8px;
      padding: 0 2px;
    }
    .section-title {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }
    .icon-button {
      width: 32px;
      height: 32px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--button-bg);
      color: var(--text);
      font: inherit;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      display: grid;
      place-items: center;
    }
    .icon-button:hover { background: var(--button-hover); }
    .icon-button.open { background: var(--button-active); }
    .icon-button.open span { transform: rotate(45deg); }
    .icon-button span { display: block; transition: transform .12s ease; }
    .create-panel {
      display: none;
      grid-template-columns: 1fr auto;
      gap: 6px;
      margin-bottom: 8px;
    }
    .create-panel.visible { display: grid; }
    .ws-input {
      min-width: 0;
      height: 34px;
      padding: 0 9px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--panel-bg);
      color: var(--text);
      font: inherit;
      outline: none;
    }
    .ws-input:focus { border-color: AccentColor; }
    .create-go {
      height: 34px;
      min-width: 48px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--button-bg);
      color: var(--text);
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    .create-go:hover { background: var(--button-hover); }
    .input-hint {
      display: none;
      margin: -3px 2px 8px;
      color: var(--muted);
      font-size: 11px;
    }
    .input-hint.input-error { display: block; color: Mark; }
    .workspace-list {
      display: grid;
      gap: 5px;
      max-height: 260px;
      overflow-y: auto;
      padding: 1px;
    }
    .workspace-row {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      align-items: center;
      gap: 8px;
      min-height: 38px;
      padding: 0 8px 0 11px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: var(--button-bg);
      color: var(--text);
      cursor: pointer;
      user-select: none;
    }
    .workspace-row:hover { background: var(--button-hover); }
    .workspace-row.active {
      border-color: AccentColor;
      background: var(--button-active);
    }
    .workspace-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
      font-weight: 650;
    }
    .workspace-count {
      min-width: 31px;
      height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: color-mix(in srgb, CanvasText 12%, transparent);
      color: var(--text);
      font-size: 13px;
      font-weight: 650;
    }
    .row-btn {
      width: 26px;
      height: 26px;
      border: 1px solid transparent;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      opacity: .72;
    }
    .row-btn:hover {
      opacity: 1;
      background: color-mix(in srgb, CanvasText 10%, transparent);
      color: var(--text);
    }
    .delete-btn:hover { color: Mark; }
    .empty-msg {
      padding: 10px 11px;
      min-height: 38px;
      display: flex;
      align-items: center;
      border-radius: var(--radius);
      background: var(--button-bg);
      color: var(--muted);
      line-height: 1.35;
    }
    .footer {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
      text-align: center;
    }
    .reset-link {
      color: var(--muted);
      text-decoration: none;
      font-size: 12px;
    }
    .reset-link:hover { color: var(--text); text-decoration: underline; }
    .confirm-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0,0,0,.28);
      align-items: center;
      justify-content: center;
    }
    .confirm-overlay.visible { display: flex; }
    .confirm-box {
      width: 255px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel-bg);
      box-shadow: var(--shadow);
    }
    .confirm-box p { margin: 0 0 12px; line-height: 1.35; }
    .btn-row { display: flex; gap: 8px; }
    .btn-row button {
      flex: 1;
      min-height: 32px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--button-bg);
      color: var(--text);
      font: inherit;
      cursor: pointer;
    }
    .btn-row button:hover { background: var(--button-hover); }
    .btn-danger { color: Mark !important; }
  </style>
</head>
<body>
  <div class="panel">
    <section class="current-box" aria-label="Current workspace">
      <p class="current-label">Current workspace</p>
      <p class="current-name" id="current-name">None</p>
    </section>

    <div class="toolbar-row">
      <div class="section-title">Workspaces</div>
      <button class="icon-button" id="add-workspace" title="Create workspace" aria-label="Create workspace"><span>+</span></button>
    </div>

    <div class="create-panel" id="create-panel">
      <input type="text" id="workspace-name" class="ws-input" placeholder="New workspace name" autocomplete="off">
      <button id="create-go" class="create-go">Add</button>
    </div>
    <div class="input-hint" id="input-hint">Press Enter to create</div>

    <div class="workspace-list" id="workspace-list"></div>

    <div class="footer">
      <a href="#" id="reset-link" class="reset-link">Reset all workspaces</a>
    </div>
  </div>

  <div class="confirm-overlay" id="confirm-overlay">
    <div class="confirm-box">
      <p id="confirm-message">Are you sure?</p>
      <div class="btn-row">
        <button class="btn-cancel" id="confirm-cancel">Cancel</button>
        <button class="btn-danger" id="confirm-ok">Delete</button>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
