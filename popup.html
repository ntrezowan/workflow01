<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Workflow01</title><style>:root{color-scheme:light dark;--bg:Canvas;--fg:CanvasText;--muted:color-mix(in srgb,CanvasText 62%,transparent);--border:color-mix(in srgb,CanvasText 18%,transparent);--accent:AccentColor;--accentText:AccentColorText;--danger:#c73838;--card:color-mix(in srgb,Canvas 92%,CanvasText 8%)}*{box-sizing:border-box}body{width:340px;margin:0;padding:12px;font:13px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--fg)}header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}h1{font-size:15px;margin:0;font-weight:700}.subtle{color:var(--muted);font-size:12px}.row{display:flex;gap:6px;align-items:center}input[type=text]{flex:1;min-width:0;border:1px solid var(--border);border-radius:8px;padding:8px 9px;background:var(--bg);color:var(--fg);outline:none}input[type=text]:focus{border-color:var(--accent)}button{border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--fg);padding:8px 10px;cursor:pointer;font:inherit}button:hover{border-color:var(--accent)}button.primary{background:var(--accent);color:var(--accentText);border-color:var(--accent)}button.danger{color:var(--danger)}button.icon{width:34px;padding-left:0;padding-right:0;text-align:center}#workspaceList{display:grid;gap:6px;margin-top:12px;max-height:330px;overflow:auto}.workspace{display:grid;grid-template-columns:1fr auto auto;gap:6px;align-items:center;border:1px solid var(--border);border-radius:10px;padding:8px;background:transparent}.workspace.active{border-color:var(--accent);background:color-mix(in srgb,AccentColor 14%,transparent)}.workspaceName{font-weight:650;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.count{color:var(--muted);font-size:12px}.footer{display:flex;justify-content:space-between;gap:6px;margin-top:12px}.status{min-height:18px;margin-top:8px;color:var(--muted);font-size:12px}.error{color:var(--danger)}input[type=file]{display:none}</style></head><body><header><div><h1>Workflow01</h1><div id="activeLabel" class="subtle">Loading…</div></div><button id="saveNow" class="icon" title="Save current workspace now">↻</button></header><div class="row"><input id="workspaceName" type="text" placeholder="New workspace name" autocomplete="off"><button id="createWorkspace" class="primary">Create</button></div><section id="workspaceList" aria-label="Workspaces"></section><div class="footer"><button id="exportBtn">Export</button><button id="importBtn">Import</button><input id="importFile" type="file" accept="application/json,.json"></div><div id="status" class="status"></div><script src="popup.js"></script></body></html>
