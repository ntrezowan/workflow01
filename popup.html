<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    /* ---- Base Light Theme ---- */
    * { box-sizing: border-box; }
    body { width: 300px; padding: 15px; font-family: system-ui, -apple-system, sans-serif; background: #ffffff; color: #333333; margin: 0; }
    h4 { margin: 0 0 8px 0; font-size: 14px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; }
    .section { margin-bottom: 16px; }

    /* ---- Current Workspace Banner ---- */
    .current-banner {
      background: #0060df;
      color: #fff;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .current-banner .label { opacity: 0.8; font-size: 12px; }
    .current-banner .name { font-weight: 700; font-size: 16px; }
    .current-banner.unassigned { background: #6b7280; }

    /* ---- Workspace List ---- */
    #workspace-list { display: flex; flex-direction: column; gap: 6px; max-height: 260px; overflow-y: auto; }

    .workspace-item {
      background: #f0f4f8;
      padding: 9px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      border: 2px solid transparent;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .workspace-item:hover { background: #e2e8f0; border-color: #cbd5e1; }
    .workspace-item.active { border-color: #0060df; background: #e8f0fe; }

    .workspace-info { display: flex; flex-direction: column; flex-grow: 1; }
    .workspace-name { font-weight: 600; font-size: 14px; }
    .workspace-tabs { font-size: 11px; color: #888; margin-top: 2px; }

    /* ---- Buttons ---- */
    .delete-btn {
      color: #999; font-size: 18px; font-weight: bold;
      padding: 0 6px; border-radius: 4px; transition: all 0.15s;
      cursor: pointer; border: none; background: none;
    }
    .delete-btn:hover { color: #d73a49; background: rgba(215, 58, 73, 0.1); }

    .action-row { display: flex; gap: 6px; margin-top: 8px; }
    .action-btn {
      flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 6px;
      background: #f5f5f5; color: #333; font-size: 12px; cursor: pointer;
      text-align: center; transition: all 0.15s;
    }
    .action-btn:hover { background: #e0e0e0; border-color: #aaa; }
    .action-btn.primary { background: #0060df; color: #fff; border-color: #0060df; }
    .action-btn.primary:hover { background: #004bb5; }

    /* ---- Input ---- */
    input {
      width: 100%; padding: 10px; border: 1px solid #ccc;
      border-radius: 6px; font-size: 14px; background: #fff;
      color: #333; transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: #0060df; box-shadow: 0 0 0 2px rgba(0,96,223,0.2); }
    .input-hint { font-size: 11px; color: #999; margin-top: 4px; }

    /* ---- Confirm Dialog ---- */
    .confirm-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center;
    }
    .confirm-overlay.visible { display: flex; }
    .confirm-box {
      background: #fff; border-radius: 10px; padding: 20px; width: 250px;
      text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .confirm-box p { margin: 0 0 16px 0; font-size: 14px; color: #333; }
    .confirm-box .btn-row { display: flex; gap: 8px; }
    .confirm-box .btn-row button {
      flex: 1; padding: 8px; border-radius: 6px; font-size: 13px;
      cursor: pointer; border: 1px solid #ccc;
    }
    .confirm-box .btn-cancel { background: #f5f5f5; color: #333; }
    .confirm-box .btn-danger { background: #d73a49; color: #fff; border-color: #d73a49; }
    .confirm-box .btn-primary { background: #0060df; color: #fff; border-color: #0060df; }

    /* ---- Auto Dark Theme ---- */
    @media (prefers-color-scheme: dark) {
      body { background: #1c1b22; color: #fbfbfe; }
      h4 { color: #aaa; }
      .current-banner { background: #0060df; }
      .current-banner.unassigned { background: #52525e; }
      .workspace-item { background: #2b2a33; border-color: transparent; color: #fbfbfe; }
      .workspace-item:hover { background: #42414d; border-color: #52525e; }
      .workspace-item.active { border-color: #00ddff; background: #2b2a33; }
      .workspace-tabs { color: #8f8f9d; }
      .delete-btn:hover { color: #ff7b72; background: rgba(255,123,114,0.2); }
      .action-btn { background: #2b2a33; border-color: #42414d; color: #fbfbfe; }
      .action-btn:hover { background: #42414d; }
      .action-btn.primary { background: #0060df; border-color: #0060df; color: #fff; }
      input { background: #2b2a33; border-color: #42414d; color: #fbfbfe; }
      input::placeholder { color: #8f8f9d; }
      input:focus { border-color: #00ddff; box-shadow: 0 0 0 2px rgba(0,221,255,0.2); }
      .confirm-box { background: #2b2a33; }
      .confirm-box p { color: #fbfbfe; }
      .confirm-box .btn-cancel { background: #42414d; color: #fbfbfe; border-color: #52525e; }
    }
  </style>
</head>
<body>

  <!-- Current workspace banner -->
  <div id="current-banner" class="current-banner unassigned">
    <div>
      <div class="label">Current Workspace</div>
      <div class="name" id="current-name">None</div>
    </div>
  </div>

  <!-- Workspace list -->
  <div class="section">
    <h4>Workspaces</h4>
    <div id="workspace-list"></div>
  </div>

  <!-- Create / open input -->
  <div class="section">
    <h4>Create or Switch</h4>
    <input type="text" id="workspace-name" placeholder="Workspace name..." autofocus>
    <div class="input-hint">Enter to create new or switch to existing</div>
  </div>

  <!-- Export / Import -->
  <div class="section">
    <div class="action-row">
      <button class="action-btn" id="btn-export">📤 Export</button>
      <button class="action-btn" id="btn-import">📥 Import</button>
    </div>
  </div>

  <!-- Hidden file input for import -->
  <input type="file" id="import-file" accept=".json" style="display:none;">

  <!-- Confirm dialog -->
  <div class="confirm-overlay" id="confirm-overlay">
    <div class="confirm-box">
      <p id="confirm-message">Are you sure?</p>
      <div class="btn-row">
        <button class="btn-cancel" id="confirm-cancel">Cancel</button>
        <button class="btn-danger" id="confirm-ok">Confirm</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
